name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        # Build golangci-lint (v2) with this job's Go toolchain via `go install`
        # rather than the prebuilt action binary. The prebuilt binaries lag the
        # latest Go release, and golangci-lint refuses to lint a module whose go
        # directive is newer than the Go it was built with — which is exactly
        # what happens while we track bleeding-edge Go. Installing from source
        # guarantees the linter is built with the same Go as the module.
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run ./...

      - name: Test
        # DB-backed tests are opt-in: they only run when DATABASE_URL_TEST is set.
        # CI leaves it unset, so no live database is required.
        run: go test ./...
        env:
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
