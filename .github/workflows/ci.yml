name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        # DB-backed tests are opt-in: they only run when DATABASE_URL_TEST is set.
        # CI leaves it unset, so no live database is required.
        run: go test ./...
        env:
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
