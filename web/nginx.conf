# Served by the nginx image's envsubst-on-templates step: ${CENTRIFUGE_UPSTREAM}
# is filled from the environment (default centrifuge:8080). nginx's own $uri /
# $host / $upstream etc. are left untouched (they are not environment variables).
#
# proxy_pass uses a *variable* upstream with a resolver so the backend host is
# resolved per-request, not at startup — otherwise nginx refuses to boot until
# the centrifuge service is up, and won't recover across its restarts. 127.0.0.11
# is Docker's embedded DNS (available on the user-defined construct_net).
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Read API + RSS feed proxied to the centrifuge backend, so the SPA calls
    # them same-origin (no CORS in production).
    location /api/ {
        set $upstream ${CENTRIFUGE_UPSTREAM};
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /feed.xml {
        set $upstream ${CENTRIFUGE_UPSTREAM};
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
